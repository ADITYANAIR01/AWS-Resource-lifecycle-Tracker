services:

  postgres:
    image: postgres:16-alpine
    container_name: lifecycle-tracker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lifecycle-tracker-app
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  poller:
    build:
      context: ./poller
      dockerfile: Dockerfile
    container_name: lifecycle-tracker-poller
    env_file:
      - .env
    environment:
      # Path where app static files are mounted inside the poller container
      STATIC_DIR: /home/appuser/static
    volumes:
      # Mount app static files into poller container for snapshot generation
      - ./app/static:/home/appuser/static:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: